services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: misat-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite+aiosqlite:////app/data/metrics.db
    volumes:
      - backend_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: misat-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:

